<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Django Lab{% endblock %}</title>
<style>
  /* Direction "Atelier" : fond encre de pin, accent laiton, sémantique
     menthe (réussi) / corail (échec). 3 fontes système, zéro build. */
  :root{
    --bg:#0F201B;
    --surface:#16302A;
    --surface-2:#1C3A33;
    --raised:#23463D;
    --border:#2B5249;
    --border-soft:#21433A;
    --text:#ECF3EF;
    --muted:#90B2A7;
    --brass:#E0B055;
    --brass-dim:#A98538;
    --mint:#74E0AC;
    --mint-dim:#2F6E52;
    --coral:#EE8A72;
    --coral-dim:#7A4034;
    --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --r:10px;
    --shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 18px 40px -24px rgba(0,0,0,.7);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 78% -8%, #1B3A32 0%, transparent 60%), var(--bg);
    color:var(--text);
    font-family:var(--sans);
    font-size:15px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
    letter-spacing:.1px;
  }
  .app{display:grid;grid-template-columns:288px 1fr;min-height:100vh}

  /* ============ SIDEBAR ============ */
  .side{
    border-right:1px solid var(--border-soft);
    background:linear-gradient(180deg,var(--surface) 0%, #122620 100%);
    padding:26px 20px;display:flex;flex-direction:column;gap:26px;
    position:sticky;top:0;height:100vh;overflow-y:auto;
  }
  .brand{display:flex;align-items:center;gap:10px;font-family:var(--mono);
    font-size:15px;letter-spacing:.5px;text-decoration:none;color:var(--text)}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--brass);
    box-shadow:0 0 0 4px rgba(224,176,85,.15)}
  .brand b{font-weight:600}

  .mods{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:3px}
  .mods li a{
    display:grid;grid-template-columns:26px 1fr;gap:12px;align-items:center;
    padding:11px 12px;border-radius:var(--r);text-decoration:none;color:var(--muted);
    border:1px solid transparent;transition:background .15s,color .15s,border-color .15s}
  .mods li a:hover{background:var(--surface-2);color:var(--text)}
  .mods .num{font-family:var(--mono);font-size:12px;text-align:center;color:#5d7d72}
  .mods .nm{font-size:13.5px;line-height:1.3}
  .mods li.cur a{background:var(--raised);color:var(--text);
    border-color:var(--border);box-shadow:var(--shadow)}
  .mods li.cur .num{color:var(--brass)}

  .side .foot{margin-top:auto;font-family:var(--mono);font-size:11px;color:#4f6e64;
    line-height:1.7;border-top:1px solid var(--border-soft);padding-top:16px}
  .side .foot b{color:var(--muted);font-weight:500}

  /* ============ MAIN ============ */
  .main{padding:46px 52px 80px;max-width:860px}
  .eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:2px;
    text-transform:uppercase;color:var(--brass);margin-bottom:14px}
  h1{font-family:var(--serif);font-weight:600;font-size:34px;line-height:1.16;
    margin:0 0 10px;letter-spacing:-.3px}
  .lede{color:var(--muted);font-size:16px;max-width:62ch;margin:0 0 34px}

  .content h2{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted);margin:34px 0 12px;font-weight:600}
  .content p{margin:0 0 14px;max-width:64ch}
  .content ul,.content ol{margin:0 0 14px;padding-left:22px;max-width:64ch}
  .content li{margin:4px 0}
  code{font-family:var(--mono);font-size:13px}
  p code,li code{background:#0d1d18;border:1px solid var(--border-soft);
    padding:1px 6px;border-radius:6px;color:#cfe6dc}
  pre{background:#0c1b16;border:1px solid var(--border-soft);border-radius:var(--r);
    padding:16px 18px;overflow:auto;margin:6px 0 16px}
  pre code{background:none;border:0;padding:0;color:#cfe6dc}

  .breadcrumb{font-family:var(--mono);font-size:12px;color:var(--muted);
    text-decoration:none;display:inline-block;margin-bottom:18px}
  .breadcrumb:hover{color:var(--text)}

  /* ============ CHECK PANEL ============ */
  .checks{margin-top:42px;border:1px solid var(--border);border-radius:14px;
    background:linear-gradient(180deg,var(--surface) 0,#13271f 100%);
    box-shadow:var(--shadow);overflow:hidden}
  .checks .top{display:flex;align-items:center;gap:14px;padding:16px 20px;
    border-bottom:1px solid var(--border-soft)}
  .checks .top .h{font-family:var(--mono);font-size:12px;letter-spacing:1.5px;
    text-transform:uppercase;color:var(--muted)}
  .checks .top .count{font-family:var(--mono);font-size:12px;color:#5d7d72}
  .btn{margin-left:auto;font-family:var(--sans);font-weight:600;font-size:14px;
    color:#1a120a;background:linear-gradient(180deg,#f0c674,var(--brass));
    border:0;border-radius:9px;padding:9px 18px;cursor:pointer;
    box-shadow:0 1px 0 rgba(255,255,255,.4) inset, 0 8px 18px -10px rgba(224,176,85,.6);
    transition:filter .15s}
  .btn:hover{filter:brightness(1.05)}
  .btn:focus-visible{outline:2px solid var(--brass);outline-offset:3px}

  .rows{list-style:none;margin:0;padding:6px}
  .row{display:grid;grid-template-columns:22px 1fr auto;gap:13px;align-items:start;
    padding:12px 14px;border-radius:9px}
  .row+.row{margin-top:2px}
  .row .mk{width:20px;height:20px;margin-top:1px;flex:none}
  .row .tx{min-width:0}
  .row .tx .t{font-size:14px}
  .row .tx .ty{font-family:var(--mono);font-size:11.5px;color:#5d7d72;margin-top:2px;letter-spacing:.3px}
  .row .st{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    align-self:center}
  .row.pass{background:rgba(116,224,172,.05)}
  .row.pass .mk{color:var(--mint)} .row.pass .st{color:var(--mint)}
  .row.fail{background:rgba(238,138,114,.06)}
  .row.fail .mk{color:var(--coral)} .row.fail .st{color:var(--coral)}
  .row .detail{grid-column:2/-1;margin-top:10px}
  .detail .msg{color:#f2c3b6;font-size:13.5px;margin-bottom:8px}
  .detail pre{margin:0;font-size:12px;border-color:var(--coral-dim);background:#1a110d}

  .banner{display:flex;align-items:center;gap:14px;margin:6px;padding:16px 18px;
    border-radius:11px;background:linear-gradient(90deg,rgba(116,224,172,.14),rgba(116,224,172,.04));
    border:1px solid var(--mint-dim)}
  .banner .em{font-size:22px}
  .banner .t b{display:block;font-size:15px}
  .banner .t span{color:var(--muted);font-size:13px}
  .banner a{margin-left:auto;color:#0f201b;background:var(--mint);text-decoration:none;
    font-weight:600;font-size:13.5px;padding:8px 16px;border-radius:8px;white-space:nowrap}

  .empty{color:var(--muted);font-style:italic}

  @media (max-width:880px){
    .app{grid-template-columns:1fr}
    .side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;gap:18px;align-items:center}
    .side .foot{display:none}
    .mods{flex-direction:row;flex-wrap:wrap}
    .mods li a{grid-template-columns:auto auto}
    .main{padding:30px 24px 60px}
    h1{font-size:28px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <a class="brand" href="{% url 'checker:index' %}"><span class="dot"></span><b>Django</b>·Lab</a>

    <ul class="mods">
      {% for m in modules %}
      <li{% if m.slug == current_slug %} class="cur"{% endif %}>
        <a href="{% url 'checker:module_detail' m.slug %}">
          <span class="num">{{ m.slug|slice:":2" }}</span>
          <span class="nm">{{ m.title }}</span>
        </a>
      </li>
      {% endfor %}
    </ul>

    <div class="foot"><b>workspace/</b> — port 8001<br><b>l'outil</b> — port 8000<br>hors-ligne · zéro build</div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
